<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trader Journal</title>
    <style>
      :root {
        --accent: #e8623a;
        --accent-soft: #f0a17a;
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }

      html, body {
        width: 100%;
        height: 100%;
        background: transparent;
        overflow: hidden;
        user-select: none;
        cursor: default;
        font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      }

      .splash {
        position: relative;
        width: 100vw;
        height: 100vh;
        border-radius: 16px;
        overflow: hidden;
        background:
          radial-gradient(120% 90% at 100% 0%, rgba(232, 98, 58, 0.55) 0%, rgba(232, 98, 58, 0) 55%),
          radial-gradient(80% 70% at 50% 120%, rgba(240, 161, 122, 0.18) 0%, rgba(0, 0, 0, 0) 60%),
          #161514;
        border: 1px solid rgba(255, 255, 255, 0.06);
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding: 38px 40px;
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.55);
      }

      /* Тёплый размытый «орб» в стиле референса */
      .orb {
        position: absolute;
        right: -60px;
        bottom: -70px;
        width: 220px;
        height: 220px;
        border-radius: 50%;
        background: radial-gradient(circle at 50% 50%, rgba(240, 161, 122, 0.85) 0%, rgba(232, 98, 58, 0.35) 40%, rgba(232, 98, 58, 0) 72%);
        filter: blur(8px);
        pointer-events: none;
      }

      .eyebrow {
        font-size: 11px;
        letter-spacing: 0.28em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.42);
        margin-bottom: 14px;
      }

      .wordmark {
        font-size: 30px;
        font-weight: 700;
        letter-spacing: 0.02em;
        color: #f5f3f1;
        line-height: 1.1;
      }
      .wordmark span { color: var(--accent-soft); }

      .tagline {
        margin-top: 10px;
        font-size: 13px;
        color: rgba(255, 255, 255, 0.5);
      }

      /* Тонкий шиммер-прогресс */
      .bar {
        position: relative;
        margin-top: 30px;
        height: 2px;
        width: 180px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 2px;
        overflow: hidden;
      }
      .bar::after {
        content: '';
        position: absolute;
        top: 0;
        left: -40%;
        height: 100%;
        width: 40%;
        background: linear-gradient(90deg, transparent, var(--accent) 50%, transparent);
        animation: slide 1.2s ease-in-out infinite;
      }
      @keyframes slide {
        0% { left: -40%; }
        100% { left: 100%; }
      }
    </style>
  </head>
  <body>
    <div class="splash">
      <div class="orb"></div>
      <div class="eyebrow">Локальный журнал трейдера</div>
      <div class="wordmark">Trader<span> Journal</span></div>
      <div class="tagline">Загрузка журнала…</div>
      <div class="bar"></div>
    </div>
  </body>
</html>
